version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8501:8501"   # NiceGUI dashboard
      - "50051:50051" # gRPC
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models:ro
    networks:
      - edge-net

  device:
    build:
      context: .
      dockerfile: device/Dockerfile
      args:
        - HAL_CAMERA_BACKEND=${HAL_CAMERA_BACKEND:-FILE}
    environment:
      - SERVER_ADDR=${SERVER_ADDR:-server:50051}
      - EDGE_ID=edge-1
      # --- SSD MobileNet v2 (default) ---
      - MODEL_PATH=${MODEL_PATH:-/app/models/ssd_mobilenet_v2.tflite}
      - LABELS_PATH=${LABELS_PATH:-/app/models/coco_labels.txt}
      # --- YOLOv8n: run `python models/export_yolov8n.py` first, then override:
      #     MODEL_PATH=/app/models/yolov8n_float32.tflite
      #     LABELS_PATH=/app/models/coco80_labels.txt
      - INPUT_DIR=/app/data/test_frames
      - CONF_THRESH=${CONF_THRESH:-0.4}
      - IOU_THRESH=${IOU_THRESH:-0.45}
      - CAM_INDEX=${CAM_INDEX:-0}
    devices:
      - "/dev/video0:/dev/video0"
    volumes:
      - ./data:/app/data   # mount so test frames can be swapped without rebuilding
    depends_on:
      - server
    networks:
      - edge-net

  py-device:
    build:
      context: .
      dockerfile: python_device/Dockerfile
    environment:
      - SERVER_ADDR=${SERVER_ADDR:-server:50051}
      - EDGE_ID=py-edge-1
      - MODEL_PATH=${MODEL_PATH:-/app/models/ssd_mobilenet_v2.tflite}
      - LABELS_PATH=${LABELS_PATH:-/app/models/coco_labels.txt}
      - INPUT_DIR=/app/data/test_frames
      - CONF_THRESH=${CONF_THRESH:-0.4}
      - IOU_THRESH=${IOU_THRESH:-0.45}
      - HAL_CAMERA_BACKEND=${HAL_CAMERA_BACKEND:-FILE}
      - CAM_INDEX=${CAM_INDEX:-0}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
    depends_on:
      - server
    networks:
      - edge-net

networks:
  edge-net:
    driver: bridge
